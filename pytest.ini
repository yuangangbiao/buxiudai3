# pytest 配置 - 修复 P1-7
# 注册所有 marker，避免 unknown marker 警告
[pytest]
# ==================== 路径 ====================
# pythonpath: PROJECT_ROOT 优先，确保 `from core.db` 找 project_root/core/ 而非 mobile_api_ai/core/
pythonpath = .
testpaths = tests
# [v3.8.1 测试污染修复] 排除调试脚本目录，避免误收集散落的 test_*.py 调试脚本
norecursedirs = scripts archive build dist node_modules .sandbox_pkgs
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ==================== 输出 ====================
addopts =
    -ra
    --strict-markers
    --tb=short
    --showlocals
    -v

# ==================== 标记 ====================
markers =
    L1: 冒烟测试（核心流程，5分钟内完成）
    L2: 模块测试（单个模块功能）
    L3: 集成测试（多模块协作）
    L4: 业务场景（端到端）
    p0: P0 关键路径
    p1: P1 重要路径
    p2: P2 一般路径
    perf: 性能测试
    security: 安全测试
    mobile: 移动端测试
    desktop: 桌面端测试
    api: API 测试
    e2e: 端到端测试
    slow: 慢测试（>30s）
    smoke: 冒烟测试
    orders: 订单相关
    process: 工序相关
    quality: 质检相关
    material: 物料相关
    production: 生产相关
    outsource: 外协相关
    repair: 报修相关
    shipment: 发货相关
    attendance: 考勤相关
    admin: 管理相关

# ==================== 并发 ====================
# 修复 A5/A10: 启用 xdist worker 隔离
addopts += -p no:cacheprovider

# ==================== 警告 ====================
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning

# 修复 A8: 原始 pytest_configure 已被替换为带 Allure 集成版本
# 保留旧版本以防回滚
# def pytest_configure(config):
#     """pytest 启动时执行"""
#     pass

# ==================== pytest-playwright 配置 (修复 A8) ====================
# https://playwright.dev/python/docs/test-runners#pytest-playwright
# 使用方式: pytest --headed  或设置环境变量 HEADLESS=false
# Trace/Video 通过 fixture 控制: page_with_trace / page_with_video

# ==================== 日志 ====================
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests/reports/logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S
