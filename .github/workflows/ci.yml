name: v3.6 CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

env:
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  DB_USER: root
  DB_PASSWORD: 88888888
  DB_NAME: container_center
  JWT_SECRET_KEY: ci_test_secret_64_bytes_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

jobs:
  ci:
    name: v3.6 full validation
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 88888888
          MYSQL_DATABASE: container_center
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --upgrade pip && pip install flake8 pymysql pyjwt flask flask-cors requests python-dotenv

      - name: Wait for MySQL
        run: python ci/wait_mysql.py

      - name: Initialize database schema
        run: python ci/init_schema.py && python ci/run_stage_1_ddl.py 2>&1 || echo "some objects already exist, ignoring"

      - name: LINT-1 check data_packages SQL remnants
        run: python ci/lint_data_packages.py

      - name: LINT-2 check hardcoded passwords
        run: python ci/lint_passwords.py

      - name: CP-1 infrastructure check
        run: python ci/check_stage_1.py

      - name: CP-2 routes and auth check
        run: python ci/check_stage_2.py

      - name: CP-3 cleanup and compliance check
        run: python ci/check_stage_3.py

      - name: Run 48 test cases
        run: python ci/test_v3_6_full.py 2>&1 | tee test_output.txt

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-${{ github.run_number }}
          path: test_output.txt
          retention-days: 1

      - name: Start 5003 dispatch center
        run: |
          echo "Starting 5003 dispatch center..."
          nohup python mobile_api_ai/standalone_dispatch_server.py > /tmp/5003.log 2>&1 &
          DISPATCH_PID=$!
          echo $DISPATCH_PID > /tmp/5003.pid
          echo "5003 PID: $DISPATCH_PID"
          echo "Waiting 5s for startup..."
          sleep 5
          echo "Checking if process is running:"
          ps aux | grep "[s]tandalone_dispatch" || echo "Process not found!"
          echo "Checking if port 5003 is listening:"
          ss -tlnp | grep 5003 || netstat -tlnp 2>/dev/null | grep 5003 || echo "Port not listening"
          echo "5003 log (first 30 lines):"
          head -30 /tmp/5003.log || echo "No log yet"
        env:
          DISPATCH_PORT: '5003'
          DISPATCH_HOST: '127.0.0.1'
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: 88888888
          DB_NAME: container_center
          JWT_SECRET_KEY: ci_test_secret_64_bytes_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

      - name: Wait for 5003 to be ready
        run: |
          echo "[wait_5003] Waiting for port 5003..."
          python ci/wait_service.py 5003 http://127.0.0.1:5003/notfound 120 || echo "EXIT_CODE=$?"

      - name: 5003 diagnostics on failure
        if: failure()
        run: |
          echo "=== 5003 Diagnostics (on failure) ==="
          echo "PID: $(cat /tmp/5003.pid 2>/dev/null || echo 'unknown')"
          ps aux | grep "[s]tandalone" || echo "Process not running"
          ss -tlnp 2>/dev/null | grep 5003 || echo "Port 5003 not listening"
          echo "--- 5003 log ---"
          cat /tmp/5003.log 2>/dev/null || echo "No log"
          echo "--- 5003 log end ---"

      - name: Upload 5003 log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 5003-log-${{ github.run_number }}
          path: /tmp/5003.log
          retention-days: 1

      - name: Start 5001 desktop web
        run: |
          echo "Starting 5001 desktop web..."
          nohup python desktop_web/server.py > /tmp/5001.log 2>&1 &
          echo $! > /tmp/5001.pid
          echo "5001 PID: $(cat /tmp/5001.pid)"
        env:
          DESKTOP_WEB_PORT: '5001'
          DISPATCH_BASE: 'http://127.0.0.1:5003'
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: 88888888
          DB_NAME: container_center
          JWT_SECRET_KEY: ci_test_secret_64_bytes_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

      - name: CI-5001 desktop web check
        run: |
          echo "[CI-5001] Starting check_5001.py..."
          python ci/check_5001.py 2>&1 | tee /tmp/check_5001_output.txt
          echo "Exit code: $?"

      - name: Upload 5001 check output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 5001-check-output-${{ github.run_number }}
          path: /tmp/check_5001_output.txt
          retention-days: 1

      - name: Upload 5001 log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 5001-log-${{ github.run_number }}
          path: /tmp/5001.log
          retention-days: 1

      - name: CP-4 final acceptance
        run: python ci/check_stage_4.py 2>&1 | tee cp4_output.txt

      - name: Upload CP-4 output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cp4-output-${{ github.run_number }}
          path: cp4_output.txt
          retention-days: 1

      - name: Cleanup servers
        if: always()
        run: |
          if [ -f /tmp/5001.pid ]; then kill $(cat /tmp/5001.pid) 2>/dev/null || true; fi
          if [ -f /tmp/5003.pid ]; then kill $(cat /tmp/5003.pid) 2>/dev/null || true; fi
