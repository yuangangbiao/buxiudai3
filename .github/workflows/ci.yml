name: v3.6 CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

env:
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  DB_USER: root
  DB_PASSWORD: 88888888
  DB_NAME: container_center
  JWT_SECRET_KEY: ci_test_secret_64_bytes_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

jobs:
  ci:
    name: v3.6 鍏ㄩ噺楠岃瘉
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 88888888
          MYSQL_DATABASE: container_center
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 瀹夎渚濊禆
        run: pip install --upgrade pip && pip install flake8 pymysql pyjwt flask

      - name: 绛夊緟 MySQL 灏辩华
        run: python ci/wait_mysql.py

      - name: 鍒濆鍖栨暟鎹簱 schema
        run: python ci/run_stage_1_ddl.py 2>&1 || echo "閮ㄥ垎瀵硅薄宸插瓨鍦紝蹇界暐"

      - name: LINT-1 鎵弿 data_packages SQL 娈嬬暀
        run: python ci/lint_data_packages.py

      - name: LINT-2 鎵弿纭紪鐮佸瘑鐮?        run: python ci/lint_passwords.py

      - name: CP-1 鍩虹璁炬柦妫€鏌?        run: python ci/check_stage_1.py

      - name: CP-2 鏍稿績璺敱+閴存潈妫€鏌?        run: python ci/check_stage_2.py

      - name: CP-3 娓呯悊+鍚堣妫€鏌?        run: python ci/check_stage_3.py

      - name: 48 娴嬭瘯鐢ㄤ緥
        run: python ci/test_v3_6_full.py

      - name: CP-4 鏈€缁堥獙鏀?        run: python ci/check_stage_4.py
