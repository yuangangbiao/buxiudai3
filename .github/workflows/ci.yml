name: v3.6 CI 流水线

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

env:
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  DB_USER: root
  DB_PASSWORD: 88888888
  DB_NAME: container_center
  JWT_SECRET_KEY: ci_test_secret_64_bytes_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

jobs:
  # ───── Job 1: 静态检查 ─────
  lint:
    name: 1. 静态检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install flake8 pymysql pyjwt flask

      - name: 扫描 data_packages 残留（应 0）
        run: |
          cd mobile_api_ai
          COUNT=$(grep -rn "FROM data_packages\|INTO data_packages\|UPDATE data_packages" --include=*.py . | grep -v "data_packages_deprecated" | wc -l)
          echo "data_packages 真实 SQL 引用数: $COUNT"
          if [ "$COUNT" -gt "0" ]; then
            echo "::error::发现 $COUNT 处 data_packages SQL 引用"
            grep -rn "FROM data_packages\|INTO data_packages\|UPDATE data_packages" --include=*.py .
            exit 1
          fi

      - name: 扫描 hardcoded 密码（应 0）
        run: |
          cd mobile_api_ai
          COUNT=$(grep -rn "88888888" --include=*.py . | wc -l)
          echo "硬编码密码数: $COUNT"
          if [ "$COUNT" -gt "0" ]; then
            echo "::warning::发现 $COUNT 处硬编码密码"
          fi

      - name: 扫描 for remove 反模式（应 0）
        run: |
          cd mobile_api_ai
          python ci/stale_file_detector.py || true

  # ───── Job 2: CP-1 基础设施检查 ─────
  cp1:
    name: 2. CP-1 基础设施
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 88888888
          MYSQL_DATABASE: container_center
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install pymysql pyjwt flask

      - name: 等待 MySQL 启动
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -u root -p88888888 --silent; then
              echo "MySQL 已就绪"
              break
            fi
            sleep 2
          done

      - name: 跑 CP-1
        run: |
          python ci/check_stage_1.py

  # ───── Job 3: CP-2 核心路由+鉴权 ─────
  cp2:
    name: 3. CP-2 核心路由+鉴权
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 88888888
          MYSQL_DATABASE: container_center
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安装依赖
        run: pip install pymysql pyjwt flask
      - name: 等待 MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -u root -p88888888 --silent; then
              break
            fi
            sleep 2
          done
      - name: 跑 CP-1（先建立 schema）
        run: python ci/check_stage_1.py
      - name: 跑 CP-2
        run: python ci/check_stage_2.py

  # ───── Job 4: CP-3 清理+合规 ─────
  cp3:
    name: 4. CP-3 清理+合规
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 88888888
          MYSQL_DATABASE: container_center
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安装依赖
        run: pip install pymysql pyjwt flask
      - name: 等待 MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -u root -p88888888 --silent; then
              break
            fi
            sleep 2
          done
      - name: 跑 CP-1+2
        run: |
          python ci/check_stage_1.py
          python ci/check_stage_2.py
      - name: 跑 CP-3
        run: python ci/check_stage_3.py

  # ───── Job 5: 48 测试用例 ─────
  test48:
    name: 5. 48 测试用例
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 88888888
          MYSQL_DATABASE: container_center
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安装依赖
        run: pip install pymysql pyjwt flask
      - name: 等待 MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -u root -p88888888 --silent; then
              break
            fi
            sleep 2
          done
      - name: 跑 CP-1+2+3（建立 schema + DROP data_packages）
        run: |
          python ci/check_stage_1.py
          python ci/check_stage_2.py
          python ci/check_stage_3.py
      - name: 跑 48 测试用例
        run: python ci/test_v3_6_full.py

  # ───── Job 6: 完整流水线（CP-4）─────
  final:
    name: 6. CP-4 最终验收
    runs-on: ubuntu-latest
    needs: [lint, cp1, cp2, cp3, test48]
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 88888888
          MYSQL_DATABASE: container_center
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pymysql pyjwt flask
      - name: 等待 MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -u root -p88888888 --silent; then
              break
            fi
            sleep 2
          done
      - name: 跑 CP-4（最终验收）
        run: python ci/check_stage_4.py
