name: v3.6 CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

env:
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  DB_USER: root
  DB_PASSWORD: 88888888
  DB_NAME: container_center
  JWT_SECRET_KEY: ci_test_secret_64_bytes_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

jobs:
  ci:
    name: v3.6 full validation (6 servers)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 88888888
          MYSQL_DATABASE: container_center
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --upgrade pip && pip install flake8 pymysql pyjwt flask flask-cors requests python-dotenv

      - name: Wait for MySQL
        run: python ci/wait_mysql.py

      - name: Initialize database schema
        run: python ci/init_schema.py && python ci/run_stage_1_ddl.py 2>&1 || echo "some objects already exist, ignoring"

      - name: LINT-1 check data_packages SQL remnants
        run: python ci/lint_data_packages.py

      - name: LINT-2 check hardcoded passwords
        run: python ci/lint_passwords.py

      - name: CP-1 infrastructure check
        run: python ci/check_stage_1.py

      - name: CP-2 routes and auth check
        run: python ci/check_stage_2.py

      - name: CP-3 cleanup and compliance check
        run: python ci/check_stage_3.py

      - name: Run 48 test cases
        run: python ci/test_v3_6_full.py 2>&1 | tee test_output.txt

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-${{ github.run_number }}
          path: test_output.txt
          retention-days: 1

      # ── Server 5003: Dispatch Center ──────────────────────────────
      - name: Start 5003 dispatch center
        run: |
          echo "Starting 5003 dispatch center..."
          nohup python mobile_api_ai/standalone_dispatch_server.py > /tmp/5003.log 2>&1 &
          DISPATCH_PID=$!
          echo $DISPATCH_PID > /tmp/5003.pid
          echo "5003 PID: $DISPATCH_PID"
          sleep 5
          ps aux | grep "[s]tandalone_dispatch" || echo "Process not found!"
          ss -tlnp | grep 5003 || netstat -tlnp 2>/dev/null | grep 5003 || echo "Port not listening"
          head -30 /tmp/5003.log || echo "No log yet"
        env:
          DISPATCH_PORT: '5003'
          DISPATCH_HOST: '127.0.0.1'
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: 88888888
          DB_NAME: container_center
          JWT_SECRET_KEY: ci_test_secret_64_bytes_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

      - name: Wait for 5003 to be ready
        run: |
          echo "[wait_5003] Waiting for port 5003..."
          python ci/wait_service.py 5003 http://127.0.0.1:5003/notfound 120 || echo "EXIT_CODE=$?"

      - name: 5003 diagnostics on failure
        if: failure()
        run: |
          echo "=== 5003 Diagnostics (on failure) ==="
          echo "PID: $(cat /tmp/5003.pid 2>/dev/null || echo 'unknown')"
          ps aux | grep "[s]tandalone" || echo "Process not running"
          ss -tlnp 2>/dev/null | grep 5003 || echo "Port 5003 not listening"
          echo "--- 5003 log ---"
          cat /tmp/5003.log 2>/dev/null || echo "No log"

      - name: Upload 5003 log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 5003-log-${{ github.run_number }}
          path: /tmp/5003.log
          retention-days: 1

      # ── Server 5001: Desktop Web ──────────────────────────────
      - name: Start 5001 desktop web
        run: |
          echo "Starting 5001 desktop web..."
          nohup python desktop_web/server.py > /tmp/5001.log 2>&1 &
          echo $! > /tmp/5001.pid
          echo "5001 PID: $(cat /tmp/5001.pid)"
          sleep 5
          ps aux | grep "[d]esktop_web" || echo "Process not found!"
          ss -tlnp | grep 5001 || echo "Port not listening"
          head -30 /tmp/5001.log || echo "No log yet"
        env:
          DESKTOP_WEB_PORT: '5001'
          DISPATCH_BASE: 'http://127.0.0.1:5003'
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: 88888888
          DB_NAME: container_center
          JWT_SECRET_KEY: ci_test_secret_64_bytes_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

      - name: Wait for 5001 to be ready
        run: |
          echo "[wait_5001] Waiting for port 5001..."
          python ci/wait_service.py 5001 http://127.0.0.1:5001/notfound 120 || echo "EXIT_CODE=$?"

      - name: CI-5001 desktop web check
        run: |
          echo "[CI-5001] Starting check_5001.py..."
          python ci/check_5001.py 2>&1 | tee /tmp/check_5001_output.txt
          echo "Exit code: $?"

      - name: Upload 5001 check output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 5001-check-output-${{ github.run_number }}
          path: /tmp/check_5001_output.txt
          retention-days: 1

      - name: Upload 5001 log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 5001-log-${{ github.run_number }}
          path: /tmp/5001.log
          retention-days: 1

      # ── Server 5008: Mobile API (报工程序) ─────────────────────
      - name: Start 5008 mobile API
        run: |
          echo "Starting 5008 mobile API (app.py)..."
          nohup python mobile_api_ai/app.py > /tmp/5008.log 2>&1 &
          echo $! > /tmp/5008.pid
          echo "5008 PID: $(cat /tmp/5008.pid)"
          sleep 5
          ps aux | grep "[a]pp\.py" || echo "Process not found!"
          ss -tlnp | grep 5008 || echo "Port not listening"
          head -30 /tmp/5008.log || echo "No log yet"
        env:
          PORT: '5008'
          FLASK_ENV: 'production'
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: 88888888
          DB_NAME: container_center
          JWT_SECRET_KEY: ci_test_secret_64_bytes_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

      - name: Wait for 5008 to be ready
        run: |
          echo "[wait_5008] Waiting for port 5008..."
          python ci/wait_service.py 5008 http://127.0.0.1:5008/notfound 120 || echo "EXIT_CODE=$?"

      - name: CI-5008 mobile API check
        run: |
          echo "[CI-5008] Starting check_5008.py..."
          python ci/check_5008.py 2>&1 | tee /tmp/check_5008_output.txt
          echo "Exit code: $?"

      - name: Upload 5008 check output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 5008-check-output-${{ github.run_number }}
          path: /tmp/check_5008_output.txt
          retention-days: 1

      - name: Upload 5008 log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 5008-log-${{ github.run_number }}
          path: /tmp/5008.log
          retention-days: 1

      # ── Server 5002: Container Center API ─────────────────────
      - name: Start 5002 container center API
        run: |
          echo "Starting 5002 container center API..."
          nohup python mobile_api_ai/container_center_api.py > /tmp/5002.log 2>&1 &
          echo $! > /tmp/5002.pid
          echo "5002 PID: $(cat /tmp/5002.pid)"
          sleep 5
          ps aux | grep "[c]ontainer_center_api" || echo "Process not found!"
          ss -tlnp | grep 5002 || echo "Port not listening"
          head -30 /tmp/5002.log || echo "No log yet"
        env:
          CONTAINER_CENTER_PORT: '5002'
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: 88888888
          DB_NAME: container_center
          JWT_SECRET_KEY: ci_test_secret_64_bytes_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

      - name: Wait for 5002 to be ready
        run: |
          echo "[wait_5002] Waiting for port 5002..."
          python ci/wait_service.py 5002 http://127.0.0.1:5002/notfound 120 || echo "EXIT_CODE=$?"

      - name: CI-5002 container center check
        run: |
          echo "[CI-5002] Starting check_5002.py..."
          python ci/check_5002.py 2>&1 | tee /tmp/check_5002_output.txt
          echo "Exit code: $?"

      - name: Upload 5002 check output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 5002-check-output-${{ github.run_number }}
          path: /tmp/check_5002_output.txt
          retention-days: 1

      - name: Upload 5002 log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 5002-log-${{ github.run_number }}
          path: /tmp/5002.log
          retention-days: 1

      # ── Server 8008: Sync Bridge ──────────────────────────────
      - name: Start 8008 sync bridge
        run: |
          echo "Starting 8008 sync bridge..."
          nohup python mobile_api_ai/sync_bridge_server.py > /tmp/8008.log 2>&1 &
          echo $! > /tmp/8008.pid
          echo "8008 PID: $(cat /tmp/8008.pid)"
          sleep 5
          ps aux | grep "[s]ync_bridge" || echo "Process not found!"
          ss -tlnp | grep 8008 || echo "Port not listening"
          head -30 /tmp/8008.log || echo "No log yet"
        env:
          SYNC_BRIDGE_PORT: '8008'
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: 88888888
          DB_NAME: container_center
          JWT_SECRET_KEY: ci_test_secret_64_bytes_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

      - name: Wait for 8008 to be ready
        run: |
          echo "[wait_8008] Waiting for port 8008..."
          python ci/wait_service.py 8008 http://127.0.0.1:8008/notfound 120 || echo "EXIT_CODE=$?"

      - name: CI-8008 sync bridge check
        run: |
          echo "[CI-8008] Starting check_8008.py..."
          python ci/check_8008.py 2>&1 | tee /tmp/check_8008_output.txt
          echo "Exit code: $?"

      - name: Upload 8008 check output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 8008-check-output-${{ github.run_number }}
          path: /tmp/check_8008_output.txt
          retention-days: 1

      - name: Upload 8008 log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 8008-log-${{ github.run_number }}
          path: /tmp/8008.log
          retention-days: 1

      # ── Server 5010: Inventory API (库存管理) ─────────────────
      - name: Start 5010 inventory API
        run: |
          echo "Starting 5010 inventory API..."
          nohup python start_5010.py > /tmp/5010.log 2>&1 &
          echo $! > /tmp/5010.pid
          echo "5010 PID: $(cat /tmp/5010.pid)"
          sleep 5
          ps aux | grep "[i]nventory_api" || ps aux | grep "[s]tart_5010" || echo "Process not found!"
          ss -tlnp | grep 5010 || echo "Port not listening"
          head -30 /tmp/5010.log || echo "No log yet"
        env:
          INVENTORY_API_PORT: '5010'
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: 88888888
          DB_NAME: container_center
          JWT_SECRET_KEY: ci_test_secret_64_bytes_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

      - name: Wait for 5010 to be ready
        run: |
          echo "[wait_5010] Waiting for port 5010..."
          python ci/wait_service.py 5010 http://127.0.0.1:5010/notfound 120 || echo "EXIT_CODE=$?"

      - name: CI-5010 inventory API check
        run: |
          echo "[CI-5010] Starting check_5010.py..."
          python ci/check_5010.py 2>&1 | tee /tmp/check_5010_output.txt
          echo "Exit code: $?"

      - name: Upload 5010 check output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 5010-check-output-${{ github.run_number }}
          path: /tmp/check_5010_output.txt
          retention-days: 1

      - name: Upload 5010 log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 5010-log-${{ github.run_number }}
          path: /tmp/5010.log
          retention-days: 1

      # ── Stage 3: Cross-Service Chain Tests ──────────────────
      - name: CI-Chain 6-server integration test
        run: |
          echo "[CI-Chain] Starting 6-server chain test..."
          python ci/test_chain.py 2>&1 | tee /tmp/chain_output.txt
          echo "Exit code: $?"
        env:
          DISPATCH_5003_URL: 'http://127.0.0.1:5003'
          WEB_5001_URL: 'http://127.0.0.1:5001'
          MOBILE_5008_URL: 'http://127.0.0.1:5008'
          CONTAINER_5002_URL: 'http://127.0.0.1:5002'
          INVENTORY_5010_URL: 'http://127.0.0.1:5010'
          SYNC_8008_URL: 'http://127.0.0.1:8008'

      - name: Upload chain test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chain-output-${{ github.run_number }}
          path: /tmp/chain_output.txt
          retention-days: 1

      # ── Stage 3.1: Data Flow & Dispatch Center ──────────────
      - name: CI-DataFlow dispatch center & report tasks
        run: |
          echo "[CI-DataFlow] Starting data flow validation..."
          python ci/test_dataflow.py 2>&1 | tee /tmp/dataflow_output.txt
          echo "Exit code: $?"
        env:
          DISPATCH_5003_URL: 'http://127.0.0.1:5003'
          WEB_5001_URL: 'http://127.0.0.1:5001'
          MOBILE_5008_URL: 'http://127.0.0.1:5008'
          CONTAINER_5002_URL: 'http://127.0.0.1:5002'
          INVENTORY_5010_URL: 'http://127.0.0.1:5010'
          SYNC_8008_URL: 'http://127.0.0.1:8008'

      - name: Upload dataflow test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dataflow-output-${{ github.run_number }}
          path: /tmp/dataflow_output.txt
          retention-days: 1

      # ── Final Acceptance ────────────────────────────────────
      - name: CP-4 final acceptance
        run: python ci/check_stage_4.py 2>&1 | tee cp4_output.txt

      - name: Upload CP-4 output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cp4-output-${{ github.run_number }}
          path: cp4_output.txt
          retention-days: 1

      - name: Cleanup servers
        if: always()
        run: |
          for pid in /tmp/5001.pid /tmp/5002.pid /tmp/5003.pid /tmp/5008.pid /tmp/8008.pid /tmp/5010.pid; do
            if [ -f "$pid" ]; then kill $(cat "$pid") 2>/dev/null || true; fi
          done
          echo "All 6 servers stopped."
