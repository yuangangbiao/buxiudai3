name: CI - 单元测试 + Lint

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  PYTHON_VERSION: '3.11'
  COVERAGE_THRESHOLD: 80

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8 on modified files
        run: |
          # 仅检查近30天内修改的文件（避免历史债务）
          MODIFIED=$(git diff --name-only --since='30 days ago' origin/master)
          if [ -n "$MODIFIED" ]; then
            flake8 $MODIFIED \
              --max-line-length=120 \
              --extend-ignore=E203,W503,F401,F403,F405,F811,E402,E401,F541,F841 \
              || echo "lint warnings (non-blocking)"
          else
            echo "无近30天修改，跳过 lint"
          fi

  unit-test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: buxiudai3_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install --timeout=300 -r requirements-ci.txt

      - name: Run L1 smoke tests
        run: |
          pytest tests/L1_smoke/ \
            --tb=short \
            -v \
            --timeout=300 \
            --junit-xml=tests/reports/pytest-results.xml \
            --cov=core \
            --cov=mobile_api_ai \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=0

      - name: Run unit tests (baseline)
        run: |
          pytest tests/unit/ \
            --tb=short \
            -v \
            --timeout=300 \
            --junit-xml=tests/reports/pytest-unit-results.xml \
            --cov=core \
            --cov=mobile_api_ai \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=10 \
            -n auto \
            --ignore=tests/unit/test_config_root.py \
            || true

      - name: Upload L1 smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-smoke-results
          path: tests/reports/pytest-results.xml
          retention-days: 30

      - name: Upload unit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-unit-results
          path: tests/reports/pytest-unit-results.xml
          retention-days: 30

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Stop containers
        if: always()
        run: docker kill $(docker ps -q) || true

  e2e-test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: buxiudai3_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install --timeout=300 -r requirements-ci.txt

      - name: Run e2e tests
        run: |
          pytest tests/e2e/ \
            --tb=short \
            -v \
            --timeout=600 \
            --junit-xml=tests/reports/pytest-e2e-results.xml \
            -n auto

      - name: Upload e2e results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-e2e-results
          path: tests/reports/pytest-e2e-results.xml
          retention-days: 30

      - name: Stop containers
        if: always()
        run: docker kill $(docker ps -q) || true
