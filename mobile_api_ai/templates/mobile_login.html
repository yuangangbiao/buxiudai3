<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>企业微信登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 40px 30px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            text-align: center;
        }
        .card h2 { font-size: 20px; color: #333; margin-bottom: 8px; }
        .card p { font-size: 14px; color: #666; line-height: 1.6; }
        .status-text { margin-top: 20px; }
        .status-text .loading { color: #07c160; }
        .status-text .error { color: #e53935; }
        .status-text .success { color: #07c160; }
        .hidden { display: none; }
        .spinner {
            display: inline-block;
            width: 32px; height: 32px;
            border: 3px solid #e0e0e0;
            border-top-color: #07c160;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .icon-check {
            display: inline-block;
            width: 48px; height: 48px;
            line-height: 48px;
            border-radius: 50%;
            background: #e8f5e9;
            color: #07c160;
            font-size: 24px;
            margin-bottom: 12px;
        }
        .icon-error {
            display: inline-block;
            width: 48px; height: 48px;
            line-height: 48px;
            border-radius: 50%;
            background: #ffebee;
            color: #e53935;
            font-size: 24px;
            margin-bottom: 12px;
        }
        .open-tip { margin-top: 24px; padding: 16px; background: #fff3e0; border-radius: 8px; }
        .open-tip p { font-size: 13px; color: #e65100; }
    </style>
</head>
<body>
    <div class="card">
        <h2>企业微信登录</h2>
        <div id="loading-state">
            <div class="spinner"></div>
            <p class="status-text"><span class="loading">正在自动登录...</span></p>
        </div>
        <div id="success-state" class="hidden">
            <div class="icon-check">✓</div>
            <p class="status-text"><span class="success">登录成功</span></p>
            <p>即将跳转...</p>
        </div>
        <div id="error-state" class="hidden">
            <div class="icon-error">✕</div>
            <p class="status-text"><span class="error" id="error-message">登录失败</span></p>
        </div>
        <div id="no-code-state" class="hidden">
            <div class="open-tip">
                <p>请在「企业微信」工作台中点开此应用</p>
                <p style="margin-top:8px;font-size:12px;color:#bf360c;">当前未检测到登录授权码</p>
            </div>
        </div>
    </div>

    <script>
    (function() {
        var LOADING = document.getElementById('loading-state');
        var SUCCESS = document.getElementById('success-state');
        var ERROR = document.getElementById('error-state');
        var ERR_MSG = document.getElementById('error-message');
        var NO_CODE = document.getElementById('no-code-state');

        function showState(el) {
            [LOADING, SUCCESS, ERROR, NO_CODE].forEach(function(s) { s.classList.add('hidden'); });
            el.classList.remove('hidden');
        }

        function getQueryParam(name) {
            var m = location.search.match(new RegExp('[?&]' + name + '=([^&]*)'));
            return m ? decodeURIComponent(m[1]) : '';
        }

        var code = getQueryParam('code');

        if (!code) {
            showState(NO_CODE);
            return;
        }

        fetch('/api/wecom/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code: code })
        })
        .then(function(r) { return r.json(); })
        .then(function(ret) {
            if (ret.code === 0) {
                localStorage.setItem('token', ret.token);
                localStorage.setItem('operator', JSON.stringify(ret.operator));
                showState(SUCCESS);
                setTimeout(function() { location.href = '/'; }, 800);
            } else {
                showState(ERROR);
                ERR_MSG.textContent = ret.message || '登录失败';
            }
        })
        .catch(function(err) {
            showState(ERROR);
            ERR_MSG.textContent = '网络异常: ' + err.message;
        });
    })();
    </script>
</body>
</html>
