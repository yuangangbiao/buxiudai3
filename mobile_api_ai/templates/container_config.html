<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>容器中心配置管理</title>
    <script>window.__CONN_CONFIG__ = {localHost: '{{ LOCAL_HOST }}', localPort: 5008, cloudHost: '{{ CLOUD_HOST }}', cloudPort: 5008};</script>
    <script src="/static/js/connection-manager.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            background: white;
            padding: 10px 40px;
            border-bottom: 1px solid #e0e0e0;
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .tab:hover {
            background: #f0f0f0;
        }

        .tab.active {
            background: #667eea;
            color: white;
        }

        .content {
            padding: 30px 40px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .card h3 {
            font-size: 18px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .item-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            border-left: 4px solid #667eea;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .item-title {
            font-weight: 600;
            font-size: 16px;
        }

        .item-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .badge-worker { background: #e3f2fd; color: #1976d2; }
        .badge-leader { background: #fff3e0; color: #f57c00; }
        .badge-qc { background: #f3e5f5; color: #7b1fa2; }
        .badge-manager { background: #e8f5e9; color: #388e3c; }

        .item-meta {
            font-size: 13px;
            color: #666;
        }

        .item-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a6fd6;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #666;
        }

        .btn-danger {
            background: #ffebee;
            color: #c62828;
        }

        .btn-success {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            font-size: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
        }

        .stats-summary {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 24px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-item .value {
            font-size: 28px;
            font-weight: 700;
        }

        .stat-item .label {
            font-size: 13px;
            opacity: 0.9;
        }

        .type-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            margin: 4px;
        }

        .type-tag.report { background: #e8f5e9; color: #2e7d32; }
        .type-tag.quality { background: #e3f2fd; color: #1976d2; }
        .type-tag.material { background: #fff3e0; color: #e65100; }
        .type-tag.approval { background: #f3e5f5; color: #7b1fa2; }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚙️ 容器中心配置管理</h1>
        <div style="display:flex; gap:8px; align-items:center;">
            <a href="/container/" style="color:rgba(255,255,255,0.85); text-decoration:none; font-size:14px; padding:6px 14px; border-radius:6px;">仪表盘</a>
            <a href="/container/alert-rules" style="color:rgba(255,255,255,0.85); text-decoration:none; font-size:14px; padding:6px 14px; border-radius:6px;">告警规则</a>
            <button class="btn btn-primary" onclick="showAddModal('operator')">+ 添加操作员</button>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="operators">👥 操作员配置</div>
        <div class="tab" data-tab="processes">⚙️ 工序配置</div>
        <div class="tab" data-tab="data-types">📊 数据类型配置</div>
        <div class="tab" data-tab="notification">🔔 通知配置</div>
    </div>

    <div class="content">
        <!-- 操作员配置 -->
        <div id="tab-operators" class="tab-content">
            <div class="card">
                <h3>👥 操作员列表</h3>
                <div class="stats-summary">
                    <div class="stat-item">
                        <div class="value" id="totalOperators">0</div>
                        <div class="label">总人数</div>
                    </div>
                    <div class="stat-item">
                        <div class="value" id="enabledOperators">0</div>
                        <div class="label">已启用</div>
                    </div>
                </div>
                <div class="item-grid" id="operatorsList"></div>
            </div>
        </div>

        <!-- 工序配置 -->
        <div id="tab-processes" class="tab-content" style="display:none;">
            <div class="card">
                <h3>⚙️ 工序列表</h3>
                <div class="stats-summary">
                    <div class="stat-item">
                        <div class="value" id="totalProcesses">0</div>
                        <div class="label">总工序数</div>
                    </div>
                </div>
                <div class="item-grid" id="processesList"></div>
            </div>
        </div>

        <!-- 数据类型配置 -->
        <div id="tab-data-types" class="tab-content" style="display:none;">
            <div class="card">
                <h3>📊 数据类型列表</h3>
                <div class="item-grid" id="dataTypesList"></div>
            </div>
        </div>

        <!-- 通知配置 -->
        <div id="tab-notification" class="tab-content" style="display:none;">
            <div class="card">
                <h3>🔔 通知设置</h3>
                <div id="notificationSettings"></div>
            </div>
        </div>
    </div>

    <!-- 添加/编辑操作员 Modal -->
    <div class="modal" id="operatorModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="operatorModalTitle">添加操作员</h3>
                <button class="modal-close" onclick="closeModal('operatorModal')">&times;</button>
            </div>
            <form id="operatorForm">
                <input type="hidden" id="operatorId">
                <div class="form-group">
                    <label>工号</label>
                    <input type="text" id="opId" placeholder="如：OP005" required>
                </div>
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="opName" placeholder="如：张三" required>
                </div>
                <div class="form-group">
                    <label>角色</label>
                    <select id="opRole">
                        <option value="工人">工人</option>
                        <option value="班组长">班组长</option>
                        <option value="质检员">质检员</option>
                        <option value="主管">主管</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>部门</label>
                    <input type="text" id="opDept" placeholder="如：生产部">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('operatorModal')">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_PATH = '/container';
        let currentConfig = { operators: {}, processes: {}, dataTypes: {}, notification: {} };

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
                tab.classList.add('active');
                document.getElementById('tab-' + tab.dataset.tab).style.display = 'block';
            });
        });

        async function loadConfig() {
            try {
                const resp = await fetch((CONN.activeBase || '') + API_PATH + '/api/container/config');
                const result = await resp.json();
                if (result.code === 0) {
                    currentConfig = result.data;
                    renderAll();
                }
            } catch (e) {
                console.error('加载配置失败:', e);
            }
        }

        function renderAll() {
            renderOperators();
            renderProcesses();
            renderDataTypes();
            renderNotification();
        }

        function renderOperators() {
            const ops = Object.values(currentConfig.operators || {});
            document.getElementById('totalOperators').textContent = ops.length;
            document.getElementById('enabledOperators').textContent = ops.filter(o => o.enabled).length;

            const roleBadgeClass = { '工人': 'badge-worker', '班组长': 'badge-leader', '质检员': 'badge-qc', '主管': 'badge-manager' };

            document.getElementById('operatorsList').innerHTML = ops.map(op => `
                <div class="item">
                    <div class="item-header">
                        <span class="item-title">${op.name}</span>
                        <span class="item-badge ${roleBadgeClass[op.role] || 'badge-worker'}">${op.role}</span>
                    </div>
                    <div class="item-meta">
                        <div>工号：${op.id}</div>
                        <div>部门：${op.department || '-'}</div>
                    </div>
                    <div class="item-actions">
                        <button class="btn btn-secondary" onclick="editOperator('${op.id}')">编辑</button>
                        <button class="btn btn-danger" onclick="deleteOperator('${op.id}')">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function renderProcesses() {
            const procs = Object.values(currentConfig.processes || {});
            document.getElementById('totalProcesses').textContent = procs.length;

            document.getElementById('processesList').innerHTML = procs.map(p => `
                <div class="item">
                    <div class="item-header">
                        <span class="item-title">${p.name}</span>
                        <span class="item-badge badge-worker">${p.enabled ? '启用' : '禁用'}</span>
                    </div>
                    <div class="item-meta">
                        <div>编码：${p.code}</div>
                        <div>顺序：${p.sequence}</div>
                        <div>需要质检：${p.quality_check_required ? '是' : '否'}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderDataTypes() {
            const types = Object.values(currentConfig.data_types || {});
            const icons = { report: '📝', quality: '🔍', material: '📦', approval: '✅', order: '📋', process: '⚙️' };

            document.getElementById('dataTypesList').innerHTML = types.map(t => `
                <div class="item">
                    <div class="item-header">
                        <span class="item-title">${icons[t.type] || '📋'} ${t.name}</span>
                        <span class="item-badge ${t.enabled ? 'badge-worker' : 'badge-qc'}">${t.enabled ? '启用' : '禁用'}</span>
                    </div>
                    <div class="item-meta">
                        <div>类型：${t.type}</div>
                        <div>自动分发：${t.auto_distribute ? '是' : '否'}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderNotification() {
            const notif = currentConfig.notification || {};
            document.getElementById('notificationSettings').innerHTML = `
                <div class="form-group">
                    <label><input type="checkbox" ${notif.enabled ? 'checked' : ''}> 启用通知</label>
                </div>
                <div class="form-group">
                    <label><input type="checkbox" ${notif.notify_on_create ? 'checked' : ''}> 创建时通知</label>
                </div>
                <div class="form-group">
                    <label><input type="checkbox" ${notif.notify_on_distribute ? 'checked' : ''}> 分发时通知</label>
                </div>
                <div class="form-group">
                    <label><input type="checkbox" ${notif.notify_on_complete ? 'checked' : ''}> 完成时通知</label>
                </div>
            `;
        }

        function showAddModal(type) {
            if (type === 'operator') {
                document.getElementById('operatorModalTitle').textContent = '添加操作员';
                document.getElementById('operatorForm').reset();
                document.getElementById('operatorId').value = '';
            }
            document.getElementById('operatorModal').classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function editOperator(id) {
            const op = currentConfig.operators[id];
            if (!op) return;

            document.getElementById('operatorModalTitle').textContent = '编辑操作员';
            document.getElementById('operatorId').value = id;
            document.getElementById('opId').value = op.id;
            document.getElementById('opId').disabled = true;
            document.getElementById('opName').value = op.name;
            document.getElementById('opRole').value = op.role;
            document.getElementById('opDept').value = op.department || '';
            document.getElementById('operatorModal').classList.add('active');
        }

        async function deleteOperator(id) {
            if (!confirm('确定要删除该操作员吗？')) return;

            try {
                const resp = await fetch((CONN.activeBase || '') + API_PATH + '/api/container/config/operator/' + id, {
                    method: 'DELETE'
                });
                const result = await resp.json();
                if (result.code === 0) {
                    alert('删除成功');
                    loadConfig();
                } else {
                    alert('删除失败: ' + result.message);
                }
            } catch (e) {
                alert('删除失败: ' + e.message);
            }
        }

        document.getElementById('operatorForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = {
                id: document.getElementById('opId').value,
                name: document.getElementById('opName').value,
                role: document.getElementById('opRole').value,
                department: document.getElementById('opDept').value,
                enabled: true
            };

            try {
                const isEdit = document.getElementById('operatorId').value;
                let url = (CONN.activeBase || '') + API_PATH + '/api/container/config/operator';
                let method = 'POST';

                if (isEdit) {
                    url += '/' + isEdit;
                    method = 'PUT';
                }

                const resp = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await resp.json();
                if (result.code === 0) {
                    alert('保存成功');
                    closeModal('operatorModal');
                    loadConfig();
                } else {
                    alert('保存失败: ' + result.message);
                }
            } catch (e) {
                alert('保存失败: ' + e.message);
            }
        });

        loadConfig();
    </script>
</body>
</html>
