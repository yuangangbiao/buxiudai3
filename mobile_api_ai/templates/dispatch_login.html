<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>调度中心 - 登录</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .login-card {
    background: #fff; border-radius: 12px; padding: 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    width: 380px; max-width: 90vw;
  }
  h1 { font-size: 24px; color: #2c3e50; margin-bottom: 8px; text-align: center; }
  .subtitle { color: #7f8c8d; font-size: 14px; text-align: center; margin-bottom: 28px; }
  label { display: block; color: #34495e; font-size: 14px; margin-bottom: 8px; font-weight: 500; }
  input[type="text"] {
    width: 100%; padding: 12px 16px; border: 1px solid #dcdfe6;
    border-radius: 6px; font-size: 15px; outline: none; transition: border 0.2s;
  }
  input[type="text"]:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
  button {
    width: 100%; padding: 12px; margin-top: 20px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff; border: none; border-radius: 6px; font-size: 16px; font-weight: 500;
    cursor: pointer; transition: transform 0.1s;
  }
  button:hover { transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  button:disabled { background: #95a5a6; cursor: not-allowed; transform: none; }
  .error { color: #e74c3c; font-size: 13px; margin-top: 12px; text-align: center; min-height: 18px; }
  .hint { color: #95a5a6; font-size: 12px; margin-top: 16px; text-align: center; }
</style>
</head>
<body>
<div class="login-card">
  <h1>📋 调度中心</h1>
  <div class="subtitle">不锈钢网带跟单系统</div>
  <form id="loginForm" autocomplete="off">
    <label for="username">员工姓名</label>
    <input type="text" id="username" name="username" placeholder="请输入您的真实姓名" required autofocus>
    <button type="submit" id="loginBtn">登 录</button>
    <div class="error" id="error"></div>
  </form>
  <div class="hint">提示: 请使用工厂登记的真实姓名登录</div>
</div>
<script>
  const form = document.getElementById('loginForm');
  const usernameInput = document.getElementById('username');
  const errorEl = document.getElementById('error');
  const btn = document.getElementById('loginBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = usernameInput.value.trim();
    if (!username) { errorEl.textContent = '请输入员工姓名'; return; }
    btn.disabled = true; btn.textContent = '登录中...'; errorEl.textContent = '';
    try {
      const r = await fetch('/api/login', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username})
      });
      const data = await r.json();
      if (data.code === 0) {
        // 1. 写 base64 token (UTF-8 安全,中文字符不报错)
        const user = data.data;
        // TextEncoder → bytes → base64(与 Python 端 base64.b64encode(str.encode()).decode() 兼容)
        const utf8Bytes = new TextEncoder().encode(`${user.id}:${user.name}`);
        const token = btoa(String.fromCharCode(...utf8Bytes));
        localStorage.setItem('dispatch_token', token);
        localStorage.setItem('dispatch_user', JSON.stringify(user));
        // 2. 跳转来源页或首页
        const redirect = sessionStorage.getItem('dispatch_redirect_after_login') || '/api/dispatch-center/';
        sessionStorage.removeItem('dispatch_redirect_after_login');
        window.location.href = redirect;
      } else {
        errorEl.textContent = data.message || '登录失败';
        btn.disabled = false; btn.textContent = '登 录';
      }
    } catch (err) {
      errorEl.textContent = '网络错误: ' + err.message;
      btn.disabled = false; btn.textContent = '登 录';
    }
  });
</script>
</body>
</html>
