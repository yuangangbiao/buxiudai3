# ============================================================
# CI/CD 流水线配置
# GitHub Actions
# ============================================================
name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ============================================================
  # 1. 代码质量检查
  # ============================================================
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-

      - name: Install lint tools
        run: |
          pip install flake8 black isort bandit

      - name: Run flake8
        run: |
          flake8 . --max-line-length=120 --extend-ignore=E203,W503 \
            --exclude=tests,__pycache__,.git,venv || true

      - name: Run black check
        run: |
          black --check --diff . --exclude='tests|__pycache__|\.git|venv' || true

      - name: Run isort check
        run: |
          isort --check-only --diff . --skip=tests --skip=__pycache__ || true

      - name: Run bandit security scan
        run: |
          bandit -r . -x tests -f json -o bandit-report.json || true

  # ============================================================
  # 2. 单元测试
  # ============================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: steel_belt_test
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 3306:3306

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-test-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install pytest-mock responses

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --cov=. --cov-report=xml --cov-report=html

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results/
            .pytest_cache/
            htmlcov/

  # ============================================================
  # 3. 安全扫描
  # ============================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          pip install bandit safety pip-audit

      - name: Run Bandit
        run: |
          bandit -r . -x tests -f json -o bandit.json || true

      - name: Run Safety check
        run: |
          safety check --json --output=safety.json || true

      - name: Run pip-audit
        run: |
          pip-audit --format=json --output=pip-audit.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit.json
            safety.json
            pip-audit.json

  # ============================================================
  # 4. 构建验证
  # ============================================================
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile app.py config.py logging_setup.py dispatch_center.py

      - name: Dependency check
        run: |
          pip install pip-check
          pip-check || true

      - name: Verify critical files
        run: |
          test -f app.py && echo "app.py exists"
          test -f config.py && echo "config.py exists"
          test -f requirements.txt && echo "requirements.txt exists"
