{% extends "inventory/base.html" %}{% block title %}系统设置{% endblock %}{% block page_title %}⚙️ 系统设置{% endblock %}{% block content %}
<div class="row g-3">
  <div class="col-md-6"><div class="card p-3"><h6>数据库配置</h6>
    <div class="mb-2"><label class="form-label">主机</label><input class="form-control form-control-sm" id="dbHost" value="{{ config.get('MYSQL_HOST','localhost') }}"></div>
    <div class="mb-2"><label class="form-label">端口</label><input class="form-control form-control-sm" id="dbPort" value="{{ config.get('MYSQL_PORT','3306') }}"></div>
    <div class="mb-2"><label class="form-label">用户名</label><input class="form-control form-control-sm" id="dbUser" value="{{ config.get('MYSQL_USER','root') }}"></div>
    <div class="mb-2"><label class="form-label">密码</label><input class="form-control form-control-sm" id="dbPass" type="password"></div>
    <div class="mb-2"><label class="form-label">数据库名</label><input class="form-control form-control-sm" id="dbName" value="inventory_db"></div>
    <button class="btn btn-primary btn-sm" onclick="saveConfig()">保存配置</button>
    <button class="btn btn-outline-success btn-sm ms-1" onclick="testConn()">测试连接</button>
    <div id="cfgMsg" class="mt-2 small"></div>
  </div></div>
  <div class="col-md-6"><div class="card p-3"><h6>其他服务</h6>
    <p class="text-muted small">报工程序: :5008</p>
    <p class="text-muted small">容器中心: :5002</p>
    <p class="text-muted small">调度中心: :5003</p>
    <hr>
    <button class="btn btn-outline-secondary btn-sm" onclick="exportAll()">导出全部数据</button>
    <button class="btn btn-outline-danger btn-sm ms-1" onclick="if(confirm('确认清理30天前的日志？'))fetch('/inventory/api/cleanup',{method:'POST'}).then(()=>location.reload())">清理旧日志</button>
  </div></div>
</div>
<script>
async function saveConfig(){
  const d={host:document.getElementById('dbHost').value,port:document.getElementById('dbPort').value,
    user:document.getElementById('dbUser').value,password:document.getElementById('dbPass').value,
    database:document.getElementById('dbName').value};
  const r=await fetch('/inventory/api/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});
  document.getElementById('cfgMsg').innerHTML=(await r.json()).ok?'✅ 已保存（重启生效）':'❌ 失败';
}
async function testConn(){ document.getElementById('cfgMsg').innerHTML='测试中...';
  const r=await fetch('/api/health'); document.getElementById('cfgMsg').innerHTML=r.ok?'✅ 连接正常':'❌ 连接失败'; }
function exportAll(){ window.location='/inventory/export/inventory'; }
</script>
{% endblock %}
