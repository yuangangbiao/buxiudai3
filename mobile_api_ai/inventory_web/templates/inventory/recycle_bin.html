{% extends "inventory/base.html" %}
{% block title %}回收站{% endblock %}
{% block content %}
<div class="container-fluid">
  <h2><i class="bi bi-trash"></i> 回收站</h2>

  <ul class="nav nav-tabs">
    <li class="nav-item"><a class="nav-link active" data-entity="product" onclick="switchEntity(this)">产品</a></li>
    <li class="nav-item"><a class="nav-link" data-entity="supplier" onclick="switchEntity(this)">供应商</a></li>
    <li class="nav-item"><a class="nav-link" data-entity="category" onclick="switchEntity(this)">分类</a></li>
    <li class="nav-item"><a class="nav-link" data-entity="warehouse" onclick="switchEntity(this)">仓库</a></li>
    <li class="nav-item"><a class="nav-link" data-entity="base" onclick="switchEntity(this)">基地</a></li>
  </ul>

  <div class="mt-3">
    <table class="table">
      <thead><tr><th>ID</th><th>名称/code</th><th>删除时间</th><th>操作</th></tr></thead>
      <tbody id="listBody"><tr><td colspan="4" class="text-center">加载中...</td></tr></tbody>
    </table>
  </div>
</div>

<script>
let currentEntity = 'product';
async function load() {
  const r = await fetch(`/inventory/api/recycle-bin/list?entity=${currentEntity}&page_size=50`);
  const d = await r.json();
  const tb = document.getElementById('listBody');
  if (!d.items.length) { tb.innerHTML = '<tr><td colspan="4" class="text-center">回收站为空</td></tr>'; return; }
  tb.innerHTML = d.items.map(it => {
    const name = it.name || it.code || `#${it.id}`;
    return `<tr>
      <td>${it.id}</td>
      <td>${name}</td>
      <td>${it.deleted_at}</td>
      <td><button class="btn btn-sm btn-success" onclick="restore(${it.id})">恢复</button></td>
    </tr>`;
  }).join('');
}
function switchEntity(el) {
  document.querySelectorAll('.nav-link').forEach(a => a.classList.remove('active'));
  el.classList.add('active');
  currentEntity = el.dataset.entity;
  load();
}
async function restore(eid) {
  if (!confirm('确认恢复？')) return;
  const r = await fetch(`/inventory/api/recycle-bin/${currentEntity}/${eid}/restore`, {
    method: 'POST', headers: {'X-CSRF-Token': getCSRFToken()}
  });
  const d = await r.json();
  alert(JSON.stringify(d));
  load();
}
function getCSRFToken() { return document.querySelector('meta[name="csrf-token"]')?.content || ''; }
load();
</script>
{% endblock %}
