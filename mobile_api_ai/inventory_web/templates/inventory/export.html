{% extends "inventory/base.html" %}
{% block title %}打印管理{% endblock %}
{% block page_title %}🖨️ 打印与导出{% endblock %}
{% block content %}
<div class="row g-3">
  <div class="col-md-4"><div class="card p-4 text-center">
    <h5>📦 库存导出</h5><p class="text-muted small">导出当前库存列表</p>
    <a href="/inventory/export/inventory" class="btn btn-success">下载 Excel</a>
  </div></div>
  <div class="col-md-4"><div class="card p-4 text-center">
    <h5>📋 交易记录</h5><p class="text-muted small">导出出入库流水</p>
    <button class="btn btn-outline-secondary" onclick="exportTrans()">下载 Excel</button>
  </div></div>
  <div class="col-md-4"><div class="card p-4 text-center">
    <h5>🖨️ 打印单据</h5><p class="text-muted small">入库单/出库单 HTML 打印</p>
    <a href="/inventory/print/preview?type=inbound" class="btn btn-outline-primary me-1">入库单</a>
    <a href="/inventory/print/preview?type=outbound" class="btn btn-outline-warning">出库单</a>
  </div></div>
</div>
<div id="msg" class="mt-3"></div>
<script>async function exportTrans(){ document.getElementById('msg').innerHTML='导出中...'; window.location='/inventory/export/transactions'; }</script>
{% endblock %}
